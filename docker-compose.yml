version: "3"
services:
  api-gateway-app:
    build: ./srcs/api-gateway-app
    container_name: api-gateway
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      API_GATEWAY_HOST: ${API_GATEWAY_HOST}
      INVENTORY_PORT: ${INVENTORY_PORT}
      INVENTORY_IP: ${INVENTORY_IP}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "3000:8081"
    networks:
      - gateway
  inventory-app:
    build: ./srcs/inventory-app
    container_name: inventory-app
    environment:
      INVENTORY_DATABASE_URL: ${INVENTORY_DATABASE_URL}
      USER_DB: ${USER_DB}
      PASSWORD_DB: ${PASSWORD_DB}
      INVENTORY_PORT: ${INVENTORY_PORT}
      INVENTORY_HOST: ${INVENTORY_HOST}
    depends_on:
      - inventory_db

    networks:
      - inventory
      - gateway

  billing-app:
    build: ./srcs/billing-app
    container_name: billing-app
    environment: 
      BILLING_DATABASE_URL: ${BILLING_DATABASE_URL}
      USER_DB: ${USER_DB}
      PASSWORD_DB: ${PASSWORD_DB}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
    depends_on:
      - billing_db
    networks:
      - billing
      - gateway

  inventory_db:
    image: postgres:15-alpine
    container_name: inventory_db
    restart: always
    environment:
      POSTGRES_USER: ${USER_DB}
      POSTGRES_PASSWORD: ${PASSWORD_DB}
      POSTGRES_DB: movies_db
    volumes:
      - inventory_data:/var/lib/postgresql/data
    networks:
      - inventory

  billing_db:
    image: postgres:15-alpine
    container_name: billing_db
    restart: always
    environment:
      POSTGRES_USER: ${USER_DB}
      POSTGRES_PASSWORD: ${PASSWORD_DB}
      POSTGRES_DB: billing_db

    volumes:
      - billing_data:/var/lib/postgresql/data
    networks:
      - billing

  rabbit-queue:
    image: rabbitmq:4-management
    container_name: rabbit-queue
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gateway

volumes:
  inventory_data:
  billing_data:
  rabbitmq_data:

networks:
  gateway:
  billing:
  inventory:
